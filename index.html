<title>Ближе — игра в вопросы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
  :root{
    --cream:#F7ECEF;
    --cream-dim:rgba(247,236,239,.66);
    --cream-faint:rgba(247,236,239,.30);
    /* c1 = bright pink glow, c2 = mid rose, c3 = deep base, c4 = accent bloom */
    --c1:#F8A6C0; --c2:#E15B86; --c3:#B22F5E; --c4:#FF7FA8;
    --serif:"Playfair Display",Georgia,"Times New Roman",serif;
    --sans:"Inter",-apple-system,system-ui,sans-serif;
  }
  /* depth in color: a flirty pink up top, sinking toward deep berry/plum
     as the questions get more intimate */
  body[data-level="1"]{--c1:#FFB3D1;--c2:#FF3D7F;--c3:#D6195F;--c4:#FF5C9E;}
  body[data-level="2"]{--c1:#FF5CA8;--c2:#D81B6A;--c3:#8E0E4C;--c4:#FF3D8F;}
  body[data-level="3"]{--c1:#F25CB0;--c2:#B0246F;--c3:#6E1A4E;--c4:#D63A8E;}

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--sans);
    color:var(--cream);
    background:
      radial-gradient(70% 55% at 80% 8%, var(--c1) 0%, transparent 52%),
      radial-gradient(85% 65% at 12% 18%, var(--c4) 0%, transparent 48%),
      radial-gradient(120% 90% at 50% 108%, var(--c3) 0%, transparent 60%),
      radial-gradient(110% 80% at 95% 95%, var(--c2) 0%, transparent 55%),
      linear-gradient(155deg, var(--c2) 0%, var(--c3) 70%, var(--c3) 100%);
    background-attachment:fixed;
    min-height:100dvh;
    transition:background .9s ease;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }
  /* joker: a fiery ember palette that overrides the level color */
  body[data-wild="1"]{
    background:
      radial-gradient(70% 50% at 50% 116%, #FFC24D 0%, transparent 46%),
      radial-gradient(60% 46% at 22% 110%, #FF7A1A 0%, transparent 50%),
      radial-gradient(60% 46% at 80% 112%, #FF4D12 0%, transparent 50%),
      radial-gradient(90% 70% at 50% 0%, #B0331A 0%, transparent 55%),
      linear-gradient(180deg, #5E1606 0%, #210800 100%);
  }
  /* flickering flames that only show during a joker */
  .fire{
    position:fixed;left:0;right:0;bottom:0;height:62%;
    pointer-events:none;opacity:0;z-index:0;transform-origin:bottom center;
    background:
      radial-gradient(50% 60% at 50% 100%, rgba(255,196,70,.5), transparent 70%),
      radial-gradient(38% 55% at 22% 100%, rgba(255,110,20,.45), transparent 72%),
      radial-gradient(38% 55% at 78% 100%, rgba(255,70,10,.45), transparent 72%);
    mix-blend-mode:screen;transition:opacity .5s ease;
  }
  body[data-wild="1"] .fire{opacity:1;animation:flicker 2.4s ease-in-out infinite;}
  @keyframes flicker{
    0%,100%{transform:translateY(0) scaleY(1);opacity:.95;}
    20%{transform:translateY(-2%) scaleY(1.06);opacity:1;}
    45%{transform:translateY(1%) scaleY(.95);opacity:.82;}
    70%{transform:translateY(-1%) scaleY(1.04);opacity:.92;}
  }
  .screen{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:max(28px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom));
    opacity:0;visibility:hidden;transform:translateY(8px);
    transition:opacity .5s ease,transform .5s ease,visibility .5s;
  }
  .screen.active{opacity:1;visibility:visible;transform:none;}

  /* ---------- start ---------- */
  .brand{font-family:var(--serif);font-weight:600;font-size:clamp(48px,14vw,86px);line-height:.95;letter-spacing:-.01em;}
  .tagline{margin-top:14px;font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-dim);font-weight:500;}
  .levels{margin-top:48px;display:flex;flex-direction:column;gap:14px;width:100%;max-width:380px;}
  .level{
    text-align:left;cursor:pointer;color:var(--cream);
    background:rgba(247,236,239,.07);
    border:1px solid var(--cream-faint);
    border-radius:18px;padding:18px 20px;
    display:grid;grid-template-columns:auto 1fr;column-gap:16px;align-items:center;
    transition:background .25s,border-color .25s,transform .15s;
    font:inherit;
  }
  .level:hover,.level:focus-visible{background:rgba(247,236,239,.13);border-color:var(--cream-dim);outline:none;}
  .level:active{transform:scale(.99);}
  .level .num{font-family:var(--serif);font-size:34px;line-height:1;font-weight:500;opacity:.5;min-width:26px;text-align:center;}
  .level .name{font-size:20px;font-weight:600;letter-spacing:.005em;}
  .level .desc{
    grid-column:2;font-size:13px;color:var(--cream-dim);line-height:1.4;
    margin-top:8px;padding-top:8px;border-top:1px solid var(--cream-faint);
  }

  /* ---------- players ---------- */
  .step-label{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-dim);font-weight:500;}
  .step-title{font-family:var(--serif);font-size:clamp(30px,8vw,46px);font-weight:500;margin-top:10px;text-align:center;}
  .players{margin-top:40px;display:flex;gap:14px;}
  .pcount{
    width:74px;height:74px;border-radius:50%;cursor:pointer;color:var(--cream);
    background:rgba(247,236,239,.06);border:1px solid var(--cream-faint);
    font-family:var(--serif);font-size:30px;font-weight:500;
    transition:background .25s,border-color .25s,transform .15s;
  }
  .pcount:hover,.pcount:focus-visible{background:rgba(247,236,239,.14);border-color:var(--cream-dim);outline:none;}
  .pcount:active{transform:scale(.94);}
  .pcaption{margin-top:18px;font-size:13px;color:var(--cream-faint);}

  .back{
    position:absolute;top:max(20px,env(safe-area-inset-top));left:20px;
    background:none;border:none;color:var(--cream-dim);font:inherit;font-size:14px;
    cursor:pointer;padding:8px;display:flex;align-items:center;gap:6px;
    transition:color .2s;z-index:5;
  }
  .back:hover,.back:focus-visible{color:var(--cream);outline:none;}

  /* ---------- game ---------- */
  #game{cursor:pointer;justify-content:space-between;padding-top:0;padding-bottom:0;}
  #game .back{position:static;top:auto;left:auto;padding:8px 8px 8px 0;align-self:flex-start;}
  .topbar{
    width:100%;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
    padding:max(22px,env(safe-area-inset-top)) 4px 0;
    font-size:13px;color:var(--cream-dim);
  }
  .topinfo{display:flex;flex-direction:column;align-items:flex-end;gap:5px;text-align:right;}
  .lvl-pill{letter-spacing:.06em;}
  .turn{
    font-family:var(--serif);font-weight:600;color:var(--cream);
    font-size:15px;letter-spacing:.01em;
  }
  .turn .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--cream);margin-right:8px;vertical-align:middle;opacity:.85;}
  .card{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;width:100%;max-width:640px;
  }
  .wild-label{
    display:none;font-family:var(--sans);font-size:12px;font-weight:700;
    letter-spacing:.28em;text-transform:uppercase;color:#FFE0A3;
    padding:7px 16px;border-radius:999px;
    border:1px solid rgba(255,180,90,.6);
    background:linear-gradient(135deg, rgba(255,140,20,.28), rgba(255,70,10,.18));
    box-shadow:0 0 24px rgba(255,120,20,.4);
  }
  body[data-wild="1"] .wild-label{display:inline-flex;align-items:center;}
  .question{
    font-family:var(--serif);font-weight:500;
    font-size:clamp(28px,6.4vw,46px);line-height:1.22;text-align:center;
    text-wrap:balance;
  }
  .question.draw{animation:rise .55s cubic-bezier(.2,.7,.2,1);}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  .footer{
    width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    padding:0 4px max(26px,env(safe-area-inset-bottom));
    font-size:13px;color:var(--cream-faint);
  }
  .skip{
    background:rgba(247,236,239,.08);border:1px solid var(--cream-faint);
    color:var(--cream-dim);font:inherit;font-size:13px;
    padding:9px 15px;border-radius:999px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;
    transition:background .2s,border-color .2s,color .2s,transform .12s;
  }
  .skip:hover,.skip:focus-visible{background:rgba(247,236,239,.16);border-color:var(--cream-dim);color:var(--cream);outline:none;}
  .skip:active{transform:scale(.96);}
  .skip .ic{font-size:15px;line-height:1;}
  .hint{display:flex;align-items:center;gap:8px;animation:breathe 2.6s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.45}50%{opacity:.85}}
  .counter{font-variant-numeric:tabular-nums;margin-left:auto;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:opacity .2s ease!important;}
    body{transition:background .2s ease;}
  }
</style>
</head>
<body data-level="1">

      <button class="level" data-level="3">
        <span class="num">3</span>
        <span class="name">Откровение</span>
        <span class="desc">Только для тех, кому доверяешь.</span>
      </button>
    </div>
  </section>

  <!-- PLAYERS -->
  <section class="screen" id="players">
    <button class="back" id="backToStart">← назад</button>

    <div class="players">
      <button class="pcount" data-n="1">1</button>
      <button class="pcount" data-n="2">2</button>
      <button class="pcount" data-n="3">3</button>
      <button class="pcount" data-n="4">4</button>
    </div>
    <div class="pcaption">Ход переходит по кругу после каждого вопроса.</div>
  </section>

  <!-- GAME -->
  <section class="screen" id="game">
    <div class="topbar">
      <button class="back" id="backToMenu">← меню</button>
      <div class="topinfo">
        <span class="lvl-pill" id="lvlPill"></span>
        <span class="turn" id="turn"></span>
      </div>
    </div>
    <div class="card">
      <span class="wild-label" id="wildLabel">Джокер</span>
      <div class="question" id="question">Нажми, чтобы открыть первый вопрос</div>
    </div>
    <div class="footer">
      <button class="skip" id="skip"><span class="ic">↻</span> другой вопрос</button>
      <span class="counter" id="counter"></span>
    </div>
  </section>

const WILD_CHANCE = 0.14;
let wildDeck = [], wildPos = 0;

const state = { level:1, players:1, current:1, deck:[], pos:0 };

const $ = s => document.querySelector(s);
const screens = { start:$('#start'), players:$('#players'), game:$('#game') };

function show(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ---- start -> players
document.querySelectorAll('.level').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.level = +btn.dataset.level;
    document.body.dataset.level = state.level;
    $('#chosenLevel').textContent = state.level;
    show('players');
  });
});
$('#backToStart').addEventListener('click',()=>{ document.body.dataset.level = 1; show('start'); });

// ---- players -> game
document.querySelectorAll('.pcount').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.players = +btn.dataset.n;
    startGame();
  });
});

const LEVEL_NAMES = {1:'Знакомство',2:'Связь',3:'Откровение'};

function startGame(){
  state.deck = shuffle(QUESTIONS[state.level].map((_,i)=>i));
  state.pos = 0;
  state.current = 1;
  wildDeck = shuffle(WILDS.map((_,i)=>i));
  wildPos = 0;
  document.body.dataset.wild = '';
  $('#question').dataset.started = '';
  $('#lvlPill').textContent = `Уровень ${state.level} · ${LEVEL_NAMES[state.level]}`;
  $('#question').textContent = 'Нажми, чтобы открыть первый вопрос';
  $('#counter').textContent = '';
  updateTurn(true);
  show('game');
}

function updateTurn(initial){
  const t = $('#turn');
  if(state.players>1){
    t.innerHTML = `<span class="dot"></span>Ход: Игрок ${state.current}`;
  } else {
    t.textContent = 'Разговор с собой';
  }
}

function drawCard(){
  if(state.pos >= state.deck.length){           // deck exhausted -> reshuffle
    state.deck = shuffle(QUESTIONS[state.level].map((_,i)=>i));
    state.pos = 0;
  }
  const qIndex = state.deck[state.pos];
  state.pos++;

  const q = $('#question');
  q.textContent = QUESTIONS[state.level][qIndex];
  q.classList.remove('draw'); void q.offsetWidth; q.classList.add('draw');
  $('#counter').textContent = `${state.pos} / ${state.deck.length}`;
}

// joker: a shared fiery action card that randomly interrupts the game (2+ players)
function showJoker(){
  if(wildPos >= wildDeck.length){ wildDeck = shuffle(WILDS.map((_,i)=>i)); wildPos = 0; }
  const idx = wildDeck[wildPos]; wildPos++;
  document.body.dataset.wild = '1';
  $('#turn').textContent = '';                 // it's a group action, no single turn
  const q = $('#question');
  q.textContent = WILDS[idx];
  q.classList.remove('draw'); void q.offsetWidth; q.classList.add('draw');
}

// tap / Space / Enter: next card AND pass the turn to the next player
function nextCard(){
  const firstReveal = $('#question').dataset.started!=='1';
  const wasJoker = document.body.dataset.wild==='1';
  $('#question').dataset.started='1';
  document.body.dataset.wild='';

  // a joker can randomly fly out instead of a question — only 2+ players,
  // never on the first card, and never right after another joker
  if(!firstReveal && !wasJoker && state.players>1 && Math.random()<WILD_CHANCE){
    showJoker();
    return;
  }
  if(!firstReveal && state.players>1){
    state.current = state.current % state.players + 1;
  }
  drawCard();
  updateTurn();
}

// skip button: another question for the SAME player (no turn change, no joker)
function skipCard(){
  $('#question').dataset.started='1';
  document.body.dataset.wild='';
  drawCard();
  updateTurn();
}

// advance on tap / key, but not when tapping the back or skip buttons
$('#game').addEventListener('click', e=>{
  if(e.target.closest('.back') || e.target.closest('.skip')) return;
  nextCard();
});
document.addEventListener('keydown', e=>{
  if(!screens.game.classList.contains('active')) return;
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); nextCard(); }
});

$('#skip').addEventListener('click', e=>{
  e.stopPropagation();
  skipCard();
});

$('#backToMenu').addEventListener('click',(e)=>{
  e.stopPropagation();
  $('#question').dataset.started='';
  document.body.dataset.wild='';
  document.body.dataset.level = 1;
  show('start');
});
</script>
</body>
</html>
